<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budgetin — Transaksi Baru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky-500:#0ea5e9;--sky-600:#0EA5E9;--sky-700:#0284c7;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;
  --gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-800:#1f2937;--gray-900:#111827;
  --green-50:#f0fdf4;--green-500:#22c55e;--green-600:#16a34a;
  --red-50:#fef2f2;--red-500:#ef4444;--red-600:#dc2626;
  --blue-50:#eff6ff;--blue-500:#3b82f6;--blue-600:#2563eb;
  --font:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
  --radius:12px;
}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);color:var(--gray-800);background:var(--gray-50);line-height:1.6;font-size:15px;min-height:100vh;display:flex;align-items:center;justify-content:center}

/* Overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);position:relative}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
.modal-title{font-size:18px;font-weight:800;color:var(--gray-900)}
.btn-close{background:none;border:none;cursor:pointer;color:var(--gray-400);padding:4px;border-radius:6px;display:flex;align-items:center}
.btn-close:hover{color:var(--gray-800);background:var(--gray-100)}

/* Tabs */
.tabs{display:flex;gap:4px;padding:16px 24px 0}
.tab{flex:1;padding:10px;border:none;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;background:var(--gray-100);color:var(--gray-500);transition:all .15s}
.tab.expense.active{background:var(--red-50);color:var(--red-600)}
.tab.income.active{background:var(--green-50);color:var(--green-600)}
.tab.transfer.active{background:var(--blue-50);color:var(--blue-600)}

/* Form */
.form-body{padding:20px 24px 24px;display:flex;flex-direction:column;gap:16px}
.amount-input{text-align:center;font-size:32px;font-weight:800;border:none;border-bottom:2px solid var(--gray-200);width:100%;padding:8px 0;outline:none;font-family:var(--font);color:var(--gray-900);background:transparent}
.amount-input::placeholder{color:var(--gray-300);font-weight:600}
.amount-input:focus{border-color:var(--sky-500)}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.3px}
.field select,.field input,.field textarea{border:1px solid var(--gray-200);border-radius:8px;padding:10px 12px;font-size:14px;font-family:var(--font);color:var(--gray-800);background:#fff;outline:none;transition:border .15s;width:100%}
.field select:focus,.field input:focus,.field textarea:focus{border-color:var(--sky-500)}
.field textarea{resize:vertical;min-height:60px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Recurring toggle */
.recurring-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--gray-50);border-radius:8px}
.recurring-label{font-size:13px;font-weight:600;color:var(--gray-600);display:flex;align-items:center;gap:6px}
.switch{width:40px;height:22px;background:var(--gray-300);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;border:none;padding:0}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.switch.on{background:var(--sky-500)}
.switch.on::after{transform:translateX(18px)}
.recurring-fields{display:flex;flex-direction:column;gap:12px;padding:12px;background:var(--gray-50);border-radius:0 0 8px 8px;margin-top:-8px}

/* Info note */
.info-note{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--blue-50);border-radius:8px;font-size:12px;color:var(--blue-600);line-height:1.4}
.info-note svg{flex-shrink:0;margin-top:1px}

/* Submit */
.btn-submit{width:100%;padding:14px;border:none;border-radius:10px;font-family:var(--font);font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .15s}
.btn-submit:hover{opacity:.9}
.btn-submit.red{background:var(--red-600)}
.btn-submit.green{background:var(--green-600)}
.btn-submit.blue{background:var(--blue-600)}

/* Tab panels */
.tab-panel{display:none}
.tab-panel.active{display:flex;flex-direction:column;gap:16px}

@media(max-width:480px){
  .modal-overlay{padding:0;align-items:flex-end}
  .modal{max-height:100vh;border-radius:var(--radius) var(--radius) 0 0;max-width:100%}
  .amount-input{font-size:28px}
}
</style>
</head>
<body>

<div class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Transaksi Baru</span>
      <button class="btn-close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="tabs">
      <button class="tab expense active">Pengeluaran</button>
      <button class="tab income">Pemasukan</button>
      <button class="tab transfer">Transfer</button>
    </div>
    <div class="form-body">
      <!-- Tab: Pengeluaran -->
      <div class="tab-panel active" id="panel-expense">
        <input class="amount-input" type="text" placeholder="Rp 0" inputmode="numeric">
        <div class="row">
          <div class="field"><label>Kategori</label>
            <select><option>Makan</option><option>Transport</option><option>Hiburan</option><option>Belanja</option><option>Tagihan</option><option>Kesehatan</option><option>Lainnya</option></select>
          </div>
          <div class="field"><label>Dari Akun</label>
            <select><option>BCA</option><option>GoPay</option><option>Jenius</option></select>
          </div>
        </div>
        <div class="row">
          <div class="field"><label>Tanggal</label><input type="date" value="2026-03-16"></div>
          <div class="field"><label>Catatan</label><input type="text" placeholder="Opsional"></div>
        </div>
        <div class="recurring-toggle">
          <span class="recurring-label">&#x1f504; Recurring</span>
          <button class="switch" role="switch" aria-checked="false"></button>
        </div>
        <!-- recurring fields (shown when toggle ON) -->
        <div class="recurring-fields" style="display:none">
          <div class="row">
            <div class="field"><label>Frekuensi</label>
              <select><option>Bulanan</option><option>Harian</option><option>Mingguan</option><option>Tahunan</option></select>
            </div>
            <div class="field"><label>Sampai Kapan</label>
              <select><option>Tanpa batas</option><option>Pilih tanggal</option></select>
            </div>
          </div>
        </div>
        <button class="btn-submit red">Simpan Pengeluaran</button>
      </div>
      <!-- Tab: Pemasukan -->
      <div class="tab-panel" id="panel-income">
        <input class="amount-input" type="text" placeholder="Rp 0" inputmode="numeric">
        <div class="row">
          <div class="field"><label>Sumber</label>
            <select><option>Gaji</option><option>Freelance</option><option>Bonus</option><option>Investasi</option><option>Lainnya</option></select>
          </div>
          <div class="field"><label>Ke Akun</label>
            <select><option>BCA</option><option>GoPay</option><option>Jenius</option></select>
          </div>
        </div>
        <div class="row">
          <div class="field"><label>Tanggal</label><input type="date" value="2026-03-16"></div>
          <div class="field"><label>Catatan</label><input type="text" placeholder="Opsional"></div>
        </div>
        <div class="recurring-toggle">
          <span class="recurring-label">&#x1f504; Recurring</span>
          <button class="switch" role="switch" aria-checked="false"></button>
        </div>
        <div class="recurring-fields" style="display:none">
          <div class="row">
            <div class="field"><label>Frekuensi</label>
              <select><option>Bulanan</option><option>Harian</option><option>Mingguan</option><option>Tahunan</option></select>
            </div>
            <div class="field"><label>Sampai Kapan</label>
              <select><option>Tanpa batas</option><option>Pilih tanggal</option></select>
            </div>
          </div>
        </div>
        <button class="btn-submit green">Simpan Pemasukan</button>
      </div>
      <!-- Tab: Transfer -->
      <div class="tab-panel" id="panel-transfer">
        <input class="amount-input" type="text" placeholder="Rp 0" inputmode="numeric">
        <div class="row">
          <div class="field"><label>Dari Akun</label>
            <select><option>BCA</option><option>GoPay</option><option>Jenius</option></select>
          </div>
          <div class="field"><label>Ke Akun</label>
            <select><option>GoPay</option><option>BCA</option><option>Jenius</option></select>
          </div>
        </div>
        <div class="row">
          <div class="field"><label>Tanggal</label><input type="date" value="2026-03-16"></div>
          <div class="field"><label>Catatan</label><input type="text" placeholder="Opsional"></div>
        </div>
        <div class="info-note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          Transfer tidak dihitung sebagai pengeluaran atau pemasukan
        </div>
        <button class="btn-submit blue">Simpan Transfer</button>
      </div>
    </div>
  </div>
</div>

<script src="transaction-modal.js"></script>
</body>
</html>
