<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budgetin — Build Task List</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f9fafb;--bg3:#f3f4f6;
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --border:#e5e7eb;--border2:#d1d5db;
  --radius:12px;--radius-sm:8px;
  --font:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
    --text:#f3f4f6;--text2:#9ca3af;--text3:#6b7280;
    --border:#374151;--border2:#4b5563;
  }
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px;padding:2rem 1rem;max-width:820px;margin:0 auto}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:16px}
.progress-row{display:flex;gap:4px;margin-bottom:20px}
.prog-seg{height:5px;border-radius:3px;flex:1;background:var(--border)}
.prog-seg.done{background:#1D9E75}
.phase-label{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:10px;display:inline-block}
.phase-section{margin-bottom:20px}
.task-card{border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;background:var(--bg)}
.task-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.task-header:hover{background:var(--bg2)}
.task-num{font-size:11px;font-weight:500;min-width:28px;color:var(--text3)}
.task-title{font-size:14px;font-weight:500;color:var(--text);flex:1}
.task-meta{font-size:11px;color:var(--text3);white-space:nowrap;margin:0 8px}
.task-chev{font-size:11px;color:var(--text3);transition:transform .2s}
.task-chev.open{transform:rotate(180deg)}
.task-body{display:none;border-top:0.5px solid var(--border);padding:12px 14px;background:var(--bg2)}
.task-body.open{display:block}
.task-note{font-size:12px;color:var(--text2);margin-bottom:8px}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;margin-bottom:10px}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;border:0.5px solid var(--border2);color:var(--text2)}
.status-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap}
.prompt-box{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--text2);white-space:pre-wrap;line-height:1.7;font-family:ui-monospace,monospace}
.copy-btn{margin-top:8px;font-size:11px;padding:5px 12px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;display:inline-block}
.copy-btn:hover{background:var(--bg3)}
</style>
</head>
<body>
<h1>Budgetin — Build Task List</h1>
<p class="subtitle">14 prompt · eksekusi satu per satu · klik untuk lihat & salin prompt-nya</p>
<div class="progress-row" id="prog-row"></div>
<div id="tl-container"></div>
<script>
const phases=[
  {label:'Sudah ada',color:'#1D9E75',bg:'#E1F5EE',tasks:[
    {id:'t0',num:'00',done:true,title:'Landing page (index.html)',meta:'Selesai — DuitKuy',note:'Sudah ada di file DuitKuy___Personal_Finance_Planner.html. Perlu rename brand ke Budgetin dan ganti warna aksen.',tags:['HTML','CSS','Done'],prompt:`Rename brand dari "DuitKuy" ke "Budgetin" di seluruh file HTML berikut.\nGanti juga:\n- <title> menjadi "Budgetin — Atur Keuanganmu dari Nol"\n- Semua teks "DuitKuy" → "Budgetin"\n- Warna aksen utama: dari green-600 (#16a34a) → #0EA5E9 (sky blue)\n- Meta description update ke brand Budgetin\nOutput: file HTML lengkap dengan perubahan tersebut.\n[paste isi file DuitKuy___Personal_Finance_Planner.html di sini]`}
  ]},
  {label:'Fase 1 — Struktur & Auth',color:'#7F77DD',bg:'#EEEDFE',tasks:[
    {id:'t1',num:'01',done:false,title:'Auth pages — Login & Register',meta:'~200 lines',note:'Dua halaman: /masuk dan /daftar. Style konsisten dengan landing page Budgetin.',tags:['HTML','CSS','Form'],prompt:`Buat dua halaman HTML terpisah untuk aplikasi "Budgetin":\n\n1. login.html — halaman /masuk\n2. register.html — halaman /daftar\n\nDesign system:\n- Font: Plus Jakarta Sans (Google Fonts)\n- Primary: #0EA5E9 | Income: #16a34a | Expense: #dc2626 | Transfer: #2563eb\n- Border radius: 12px cards, 8px inputs | Background: #f9fafb\n\nLogin: Email, Password, tombol "Masuk", link ke /daftar\nRegister: Nama, Email, Password, Konfirmasi, tombol "Daftar Gratis", link ke /masuk\n\nConstraints:\n- Pure HTML + CSS, no framework, mobile-first\n- Bahasa Indonesia, no JS, max 200 lines per file`},
    {id:'t2',num:'02',done:false,title:'App shell — layout dasar post-login',meta:'~250 lines',note:'Sidebar navigation + main content area. Template yang dipakai SEMUA halaman dalam app.',tags:['HTML','CSS','Layout'],prompt:`Buat app-shell.html — template layout utama untuk "Budgetin" post-login.\n\nLayout:\n- Sidebar kiri (fixed, 240px) dengan navigasi\n- Main content area (flex-1, scrollable)\n- Top bar (mobile only) dengan hamburger menu\n\nSidebar nav: Dashboard | Transaksi | Anggaran | Laporan | Akun Saya | Pengaturan\nSidebar footer: nama user "Budi Santoso" + tombol logout\nMain content: placeholder "Konten halaman di sini"\n\nDesign system: Plus Jakarta Sans, #0EA5E9 primary\nConstraints: Pure HTML+CSS, sidebar collapse jadi bottom nav di mobile, max 250 lines`}
  ]},
  {label:'Fase 2 — Core Features',color:'#378ADD',bg:'#E6F1FB',tasks:[
    {id:'t3',num:'03',done:false,title:'Dashboard page',meta:'~300 lines',note:'6 widget: net worth, cashflow, budget status, transaksi terakhir, quick actions, spending trend.',tags:['HTML','CSS','Dashboard'],prompt:`Buat dashboard.html untuk "Budgetin" menggunakan app-shell sebagai base.\n\nWidget 1 — Net Worth: Total Rp 24.500.000 | BCA 15jt | GoPay 2,5jt | Jenius 7jt | badge "+Rp 1.200.000 bulan lalu"\n\nWidget 2 — Cashflow: Pemasukan Rp 8.500.000 (green) | Pengeluaran Rp 5.200.000 (red) | Selisih +Rp 3.300.000\n\nWidget 3 — Budget 5 kategori:\n- Makan 1.200/1.500 (80%) Hampir Limit (amber)\n- Transport 450/600 (75%) Aman (green)\n- Hiburan 320/300 (107%) Over Budget (red)\n- Belanja 800/1.000 (80%) Hampir Limit (amber)\n- Tagihan 500/500 (100%) Hampir Limit (amber)\n\nWidget 4 — 5 transaksi terakhir (expense=red, income=green, transfer=blue+⇄)\nWidget 5 — Quick actions: "+ Pengeluaran" (red) | "+ Pemasukan" (green) | "⇄ Transfer" (blue)\n\nConstraints: static data, color coding wajib benar, progress bar green<75%/amber 75-100%/red>100%, max 300 lines`},
    {id:'t4',num:'04',done:false,title:'Form input transaksi (modal)',meta:'~250 lines',note:'Satu modal form untuk 3 tipe: expense, income, transfer. Toggle antar tipe dengan JS.',tags:['HTML','CSS','JS','Form'],prompt:`Buat transaction-modal.html — komponen modal form transaksi untuk "Budgetin".\n\n3 TAB di bagian atas: [Pengeluaran] [Pemasukan] [Transfer]\n\nTAB Pengeluaran (default, red accent):\nJumlah | Kategori dropdown | Dari akun | Tanggal | Catatan | Tombol "Simpan Pengeluaran"\n\nTAB Pemasukan (green accent):\nJumlah | Sumber dropdown | Ke akun | Tanggal | Catatan | Tombol "Simpan Pemasukan"\n\nTAB Transfer (blue accent):\nJumlah | Dari akun | Ke akun (tidak boleh sama) | Tanggal | Catatan | Tombol "Simpan Transfer"\nNote kecil: "Transfer tidak dihitung sebagai pengeluaran atau pemasukan"\n\nJS: tab switch ganti form+warna | format angka otomatis | disable ke-akun sama dengan dari-akun\nConstraints: max 250 lines, full screen di mobile`},
    {id:'t5',num:'05',done:false,title:'Halaman daftar transaksi (/transaksi)',meta:'~250 lines',note:'List semua transaksi dengan filter tipe, kategori, dan tanggal. Data statis.',tags:['HTML','CSS','JS'],prompt:`Buat transactions.html — halaman daftar transaksi untuk "Budgetin".\n\nHeader:\n- Filter tabs: [Semua] [Pengeluaran] [Pemasukan] [Transfer]\n- Dropdown bulan + kategori\n- Tombol "+ Catat Transaksi"\n\nSummary strip:\n- Pemasukan Rp 8.500.000 (green) | Pengeluaran Rp 5.200.000 (red) | Transfer Rp 2.000.000 (blue, note: tidak masuk cashflow)\n\nTransaction list (10 data hardcoded):\n- Setiap row: icon kategori, nama/deskripsi, kategori/akun, tanggal, jumlah (warna tipe), badge tipe\n- Transfer: tampilkan "dari → ke", icon ⇄, warna biru\n\nJS filter: klik tab → tampilkan hanya tipe tersebut\nConstraints: max 250 lines, design system Budgetin`},
    {id:'t6',num:'06',done:false,title:'Halaman budget (/anggaran)',meta:'~250 lines',note:'Set budget per kategori, tampil perbandingan budget vs realisasi dengan progress bar.',tags:['HTML','CSS','JS'],prompt:`Buat budget.html — halaman manajemen anggaran untuk "Budgetin".\n\nHeader: "Anggaran" + period selector "Maret 2026" + tombol "+ Atur Budget"\n\nSummary: Total budget Rp 5.000.000 | Realisasi Rp 4.270.000 | Sisa Rp 730.000 | Status "Dalam Kendali" (green)\n\n7 kategori hardcoded:\n1. Makan 1.500.000 / 1.200.000 → Aman\n2. Transport 600.000 / 450.000 → Aman\n3. Hiburan 300.000 / 320.000 → OVER\n4. Belanja 1.000.000 / 800.000 → Hampir Limit\n5. Tagihan 500.000 / 500.000 → Hampir Limit\n6. Kesehatan 300.000 / 0 → Aman\n7. Lainnya 800.000 / 1.000.000 → OVER\n\nSetiap kartu: nama, progress bar (green/amber/red), budget vs realisasi, status badge, sisa/lebih\nEdit inline JS: klik angka → input → Enter simpan + update progress bar\n\nCatatan: "Budget hanya untuk pengeluaran. Transfer tidak dihitung."\nConstraints: max 250 lines`}
  ]},
  {label:'Fase 3 — Secondary Pages',color:'#BA7517',bg:'#FAEEDA',tasks:[
    {id:'t7',num:'07',done:false,title:'Halaman akun saya (/akun)',meta:'~200 lines',note:'Daftar semua akun (bank + e-wallet), saldo masing-masing, total net worth.',tags:['HTML','CSS'],prompt:`Buat accounts.html — halaman manajemen akun untuk "Budgetin".\n\nHeader: "Akun Saya" + tombol "+ Tambah Akun"\n\nNet worth card: Total Rp 24.500.000 | +Rp 1.200.000 dari bulan lalu (+5.1%) green\nNote: "Net worth = total saldo semua akun"\n\nDaftar akun:\nBank: BCA Tahapan Rp 15jt | Jenius Rp 7jt\nE-Wallet: GoPay Rp 2,5jt | OVO Rp 0\nInvestasi: Reksa Dana (Bibit) Rp 0\n\nSetiap kartu: nama + tipe, saldo, keterangan, tombol "Edit"\nCatatan: "Transfer antar akun tidak mengubah total net worth."\nConstraints: max 200 lines, design system Budgetin`},
    {id:'t8',num:'08',done:false,title:'Halaman laporan (/laporan)',meta:'~250 lines',note:'Grafik cashflow bulanan, pie chart per kategori, performa budget. Pakai Chart.js.',tags:['HTML','CSS','JS','Chart.js'],prompt:`Buat reports.html — halaman laporan untuk "Budgetin". Gunakan Chart.js dari CDN:\nhttps://cdn.jsdelivr.net/npm/chart.js\n\n3 chart:\n1. Cashflow 6 bulan (grouped bar): Pemasukan (green) vs Pengeluaran (red) Okt 2025–Mar 2026, sumbu Y format Rp juta\n2. Pengeluaran per kategori (donut): 7 kategori, warna berbeda, legend di samping\n3. Performa budget (horizontal bar): budget (gray) vs realisasi (green/amber/red) per kategori\n\nSummary stats: bulan terbaik | kategori terboros | rata-rata pengeluaran harian\n\nConstraints: max 250 lines, responsive charts, data hardcoded`},
    {id:'t9',num:'09',done:false,title:'Halaman pengaturan (/pengaturan)',meta:'~200 lines',note:'Profil user, kategori custom, preferensi, export data.',tags:['HTML','CSS'],prompt:`Buat settings.html — halaman pengaturan untuk "Budgetin". Tab navigation di main content.\n\nTab 1 — Profil: Nama, Email (disabled), Mata uang (IDR), tombol "Simpan"\n\nTab 2 — Kategori:\n- 7 kategori default + warna + tombol hapus\n- Form tambah kategori: nama + pilih warna\n- Note: "Kategori custom hanya untuk pengeluaran"\n\nTab 3 — Akun & Data:\n- Tombol "Export CSV" + "Export JSON"\n- Zona bahaya: "Hapus semua data" (red, dengan konfirmasi)\n\nConstraints: tab switching JS, max 200 lines, form UI only`}
  ]},
  {label:'Fase 4 — Polish & Integration',color:'#D85A30',bg:'#FAECE7',tasks:[
    {id:'t10',num:'10',done:false,title:'Local storage — persistensi data',meta:'~150 lines JS',note:'Biar data tidak hilang saat refresh. Pure localStorage, no backend.',tags:['JavaScript','localStorage'],prompt:`Buat storage.js — modul JavaScript untuk "Budgetin" menggunakan localStorage.\n\nData structure:\n- accounts: [{id, name, type, balance, note}]\n- transactions: [{id, type, amount, category, fromAccount, toAccount, date, note}]\n  type: 'expense' | 'income' | 'transfer'\n- budgets: [{id, category, amount, month}] (month: "2026-03")\n\nFungsi wajib:\ngetAccounts() | saveAccount() | updateAccount()\ngetTransactions(filters?) | saveTransaction() | deleteTransaction()\ngetBudgets(month) | saveBudget() | updateBudget()\ngetNetWorth() → number\ngetCashflow(month) → {income, expense} — EXCLUDE transfer\ngetBudgetVsActual(month) → [{category, budget, actual, percentage, status}]\nseedDemoData()\n\nBusiness logic WAJIB:\n- Transfer: update saldo fromAccount (kurang) dan toAccount (tambah)\n- Transfer TIDAK masuk getCashflow()\n- Budget hanya type='expense'\n\nMax 150 lines, JSDoc comments setiap fungsi.`},
    {id:'t11',num:'11',done:false,title:'Integrasi storage.js ke semua halaman',meta:'~100 lines per halaman',note:'Sambungkan storage.js ke dashboard, transaksi, budget, akun. Data jadi dinamis.',tags:['JavaScript','Integration'],prompt:`Tambahkan integrasi storage.js ke halaman-halaman "Budgetin":\n\ndashboard.html:\n- Load dari getNetWorth(), getCashflow(), getBudgetVsActual()\n- Panggil seedDemoData() jika localStorage kosong\n\ntransactions.html:\n- Load dari getTransactions()\n- Filter tabs update list berdasarkan tipe\n\nbudget.html:\n- Load dari getBudgetVsActual(currentMonth)\n- Edit inline → updateBudget()\n\naccounts.html:\n- Load dari getAccounts() + getNetWorth()\n\ntransaction-modal (submit):\n- onSubmit → saveTransaction(data) → update account balance → tutup modal → refresh list\n\nConstraints: <script> block per halaman, DOMContentLoaded, max 100 lines tambahan per halaman`},
    {id:'t12',num:'12',done:false,title:'Responsive & mobile fixes',meta:'~100 lines CSS',note:'Audit semua halaman di mobile view. Fix layout yang rusak.',tags:['CSS','Responsive'],prompt:`Buat mobile.css — file CSS khusus mobile untuk "Budgetin" (max-width: 768px).\n\nChecklist:\n- Sidebar collapse → bottom navigation bar 5 icons\n- Main content: full width, padding 16px\n- Dashboard: widgets stack vertikal, quick actions horizontal scroll\n- Transaksi filter tabs: horizontal scroll\n- Budget cards: stack vertikal, edit via tap\n- Modal form: full screen (100vw 100vh), input min 48px height\n- Charts: stack vertikal, height 200px\n- Touch targets minimum 44px\n\nOutput: mobile.css yang di-include di semua halaman. Max 100 lines.`},
    {id:'t13',num:'13',done:false,title:'Blog page + 1 artikel',meta:'~200 lines',note:'Halaman daftar blog + satu artikel lengkap untuk SEO.',tags:['HTML','CSS','SEO'],prompt:`Buat dua file untuk blog "Budgetin":\n\n1. blog.html — daftar artikel:\n- Grid 3 kolom (2 tablet, 1 mobile)\n- 5 artikel cards: judul, excerpt 2 kalimat, tanggal, estimasi baca, CTA "Baca →"\n- Sidebar: widget "Mulai tracking sekarang" CTA ke /daftar\n\n2. artikel-transfer-vs-pengeluaran.html:\n- Judul: "Pengeluaran vs Transfer: Kenapa Kamu Harus Bedain Keduanya di Catatan Keuangan"\n- Keyword: "catat keuangan transfer antar rekening"\n- 600-800 kata Bahasa Indonesia\n- Struktur: intro → problem → penjelasan → cara benar → CTA Budgetin\n- SEO: meta description, OG tags, heading H1/H2/H3\n\nConstraints: max 200 lines per file, tone casual, CTA ke /daftar`}
  ]}
];

const container=document.getElementById('tl-container');
const progRow=document.getElementById('prog-row');

phases.forEach(phase=>{
  const section=document.createElement('div');
  section.className='phase-section';
  const lbl=document.createElement('div');
  lbl.className='phase-label';
  lbl.style.cssText=`background:${phase.bg};color:${phase.color};border:0.5px solid ${phase.color}40`;
  lbl.textContent=phase.label;
  section.appendChild(lbl);
  phase.tasks.forEach(task=>{
    const seg=document.createElement('div');
    seg.className='prog-seg'+(task.done?' done':'');
    progRow.appendChild(seg);
    const card=document.createElement('div');
    card.className='task-card';
    if(task.done)card.style.opacity='0.65';
    const statusHTML=task.done
      ?'<span class="status-badge" style="background:#E1F5EE;color:#1D9E75;margin-right:4px">Selesai</span>'
      :'<span class="status-badge" style="background:#f3f4f6;color:#9ca3af;margin-right:4px">Belum</span>';
    const tagHTML=task.tags.map(t=>`<span class="tag">${t}</span>`).join('');
    card.innerHTML=`
      <div class="task-header" onclick="tog('${task.id}')">
        <span class="task-num">${task.num}</span>
        <div style="flex:1"><div class="task-title">${task.title}</div></div>
        ${statusHTML}
        <span class="task-meta">${task.meta}</span>
        <span class="task-chev" id="chev-${task.id}">▼</span>
      </div>
      <div class="task-body" id="body-${task.id}">
        <div class="task-note">${task.note}</div>
        <div class="tag-row">${tagHTML}</div>
        <div class="prompt-box" id="prompt-${task.id}">${esc(task.prompt)}</div>
        <button class="copy-btn" onclick="cp('${task.id}')">Salin prompt</button>
      </div>`;
    section.appendChild(card);
  });
  container.appendChild(section);
});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tog(id){
  const b=document.getElementById('body-'+id),c=document.getElementById('chev-'+id);
  const o=b.classList.contains('open');
  b.classList.toggle('open',!o);c.classList.toggle('open',!o);
}
function cp(id){
  navigator.clipboard.writeText(document.getElementById('prompt-'+id).innerText).then(()=>{
    const btn=document.getElementById('prompt-'+id).nextElementSibling;
    btn.textContent='Tersalin!';
    setTimeout(()=>btn.textContent='Salin prompt',1500);
  });
}
tog('t1');
</script>
</body>
</html>
